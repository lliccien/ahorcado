# Compose para Dokploy (camino idiomático con Traefik):
#  - `web` y `api` se exponen vía dominios configurados en la UI de Dokploy.
#  - `db` (Postgres) y `redis` corren dentro del propio stack, sin ningún
#    expose externo. Solo la `api` los alcanza por sus nombres internos.
#  - Ambos servicios externos (web y api) se conectan a `dokploy-network`
#    (red externa creada por Dokploy) para que Traefik los descubra.
#
# Puertos internos (no se publican al host):
#   api: ${API_PORT:-3000}     (Nest)
#   web: ${WEB_PORT:-4321}     (Astro SSR — mismo puerto que `astro dev`)
#
# Routing del navegador (mismo dominio):
#   /            → web   (Astro SSR)
#   /api/*       → api   (configurar Strip Path = ON en la UI)
#   /socket.io/* → api   (Strip Path = OFF, Socket.IO necesita su path)
#
# Variables que debes definir en la pestaña Environment de Dokploy:
#   DB_PASSWORD=<contraseña que quieras>
#
# Primer deploy (DB vacía): añade temporalmente
#   DB_SYNCHRONIZE=true
# para que TypeORM cree el schema. Una vez creado, vuelve a desplegar sin
# esa variable (o ponla "false") para que el schema no se modifique solo
# en arranques posteriores.
#
# Opcionales (con defaults sensatos):
#   DB_USERNAME, DB_NAME, DB_HOST, DB_PORT, REDIS_HOST, REDIS_PORT,
#   API_PORT, WEB_PORT, NODE_ENV, CORS_ORIGIN, DB_SYNCHRONIZE,
#   WORDS_SEED_AUTO, WORDS_SEED_LOCALE

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ahorcado}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
      POSTGRES_DB: ${DB_NAME:-ahorcado}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-ahorcado}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido}
      DB_NAME: ${DB_NAME:-ahorcado}
      # `synchronize` de TypeORM:
      #   - Vacío en prod → OFF por defecto (seguro).
      #   - Pon "true" en el primer deploy para que TypeORM cree las tablas.
      #   - Una vez creadas, quítalo o ponlo "false".
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # En prod el navegador entra por el mismo dominio vía Traefik,
      # así que CORS no es necesario. Solo defínelo si vas a exponer
      # el API a otro origen distinto (lista separada por comas).
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    expose:
      - "${API_PORT:-3000}"
    networks:
      - default
      - dokploy-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:'+(process.env.API_PORT||3000)+'/health/liveness',{timeout:3000},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        # Mismo origen: el cliente Astro llamará a `/api/*` y socket.io
        # al propio dominio. Traefik enruta al backend.
        PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: ${WEB_PORT:-4321}
    expose:
      - "${WEB_PORT:-4321}"
    networks:
      - default
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:'+(process.env.PORT||4321)+'/',{timeout:3000},r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

networks:
  default:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
