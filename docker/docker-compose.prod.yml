# Compose para Dokploy (camino idiomático con Traefik):
#  - Solo `web` y `api` — sin Caddy. Traefik (instalado por Dokploy a
#    nivel host) se encarga del TLS y el routing por dominio/path.
#  - Ambos servicios se conectan a `dokploy-network` (red externa
#    creada por Dokploy) además de la red default del stack para que
#    Traefik los descubra y `web` siga pudiendo hablar con `api` por
#    DNS interno (`api:3000`) si lo necesitara.
#  - Routing del navegador (mismo dominio):
#      /            → web   (Astro SSR)
#      /api/*       → api   (Dokploy lo configura con stripPath)
#      /socket.io/* → api   (sin stripPath; Socket.IO necesita su path)
#
# En la UI de Dokploy → Domains, crea 3 entradas con el mismo Host
# apuntando al mismo puerto interno 3000 de cada servicio.

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # En prod el navegador entra por el mismo dominio vía Traefik,
      # así que CORS no es necesario. Define este valor solo si vas a
      # exponer el API a otro origen distinto (lista separada por comas).
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    expose:
      - "3000"
    networks:
      - default
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        # Mismo origen: el cliente Astro llamará a `/api/*` y socket.io
        # al propio dominio. Traefik enruta al backend.
        PUBLIC_API_URL: ""
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - default
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
  dokploy-network:
    external: true
